<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.1" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background Squircle -->
  <rect x="48" y="48" width="416" height="416" rx="100" fill="url(#bgGradient)" filter="url(#dropShadow)"/>
  
  <!-- RSS Symbol Group (Shifted up slightly to accommodate text) -->
  <g transform="translate(10, -15)" filter="url(#innerShadow)">
    <!-- Dot -->
    <circle cx="140" cy="362" r="42" fill="#FFFFFF"/>
    
    <!-- Inner Arc -->
    <path d="M 140 242               A 120 120 0 0 1 260 362               L 202 362               A 62 62 0 0 0 140 300               Z" fill="#FFFFFF"/>
    
    <!-- Outer Arc -->
    <path d="M 140 142               A 220 220 0 0 1 360 362               L 302 362               A 162 162 0 0 0 140 200               Z" fill="#FFFFFF"/>
  </g>

  <!-- Branding Text -->
  <text x="256" y="432" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="900" fill="#FFFFFF" text-anchor="middle" style="letter-spacing: 1.5px; text-transform: uppercase;" filter="url(#innerShadow)">Alchemy RSS</text>

  <!-- Material Design Gloss Overlay -->
  <path d="M 148 48             C 92.77 48 48 92.77 48 148             L 48 200             Q 256 200 464 148             L 464 148             C 464 92.77 419.23 48 364 48             L 148 48 Z" fill="#FFFFFF" opacity="0.1"/>
</svg>