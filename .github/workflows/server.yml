name: RSS Runner

run-name: 'Runner #${{ github.run_number }} ${{ inputs.suffix }}'

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Input suffix'
        required: false
        type: string
      mode:
        description: 'Run mode: once | backfill'
        required: false
        type: string
        default: 'once'
      backfill_reset:
        description: 'Backfill reset (true/false) to overwrite data'
        required: false
        type: string
        default: 'false'
      backfill_page_size:
        description: 'Backfill page size (API limit default 100)'
        required: false
        type: string
        default: '100'
      backfill_max_pages:
        description: 'Backfill max pages per source'
        required: false
        type: string
        default: '20'
      backfill_delay_ms:
        description: 'Backfill delay between pages (ms)'
        required: false
        type: string
        default: '500'

  schedule:
    - cron: '0 */2 * * *'
    
jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      RUN_MODE: ${{ github.event.inputs.mode || 'once' }}
      BACKFILL_RESET: ${{ github.event.inputs.backfill_reset || 'false' }}

    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
        run_install: false
        
    - name: Use node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: pnpm
        cache-dependency-path: server/pnpm-lock.yaml
    
    - name: Get pnpm cache directory
      id: pnpm-store-path
      shell: bash
      run: echo "dir=$(pnpm store path)" >> ${GITHUB_OUTPUT}

    - name: Cache modules
      id: pnpm-cache
      uses: actions/cache@v3
      with:
        path: |
          ${{ steps.pnpm-store-path.outputs.dir }}
        key: ${{ runner.os }}-pnpm-202412-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-202412-

    - name: Restore data from gh-pages
      if: ${{ env.RUN_MODE != 'backfill' || env.BACKFILL_RESET != 'true' }}
      run: |
        git fetch origin gh-pages
        if git cat-file -e origin/gh-pages:public/data/links.json 2>/dev/null; then
          git checkout origin/gh-pages -- public/data public/details public/README.md public/TAGS.md || true
          mkdir -p data details
          cp -R public/data/. data/ || true
          cp -R public/details/. details/ || true
          cp public/README.md README.md || true
          cp public/TAGS.md TAGS.md || true
        else
          git checkout origin/gh-pages -- data details README.md TAGS.md || true
        fi

    - name: Install and run crawler
      id: crawler
      working-directory: ./server
      env:
        WORKFLOW: true
        RSS_CONFIG: ${{ secrets.RSS_CONFIG }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BESTBLOGS_API_KEY: ${{ secrets.BESTBLOGS_API_KEY }}
        BACKFILL_RESET: ${{ github.event.inputs.backfill_reset }}
        BACKFILL_PAGE_SIZE: ${{ github.event.inputs.backfill_page_size }}
        BACKFILL_MAX_PAGES: ${{ github.event.inputs.backfill_max_pages }}
        BACKFILL_DELAY_MS: ${{ github.event.inputs.backfill_delay_ms }}
      run: |
        echo "=== Environment Check ==="
        echo "WORKFLOW: $WORKFLOW"
        echo "API Key configured: $([ -n \"$BESTBLOGS_API_KEY\" ] && echo 'YES' || echo 'NO')"
        echo "API Key length: ${#BESTBLOGS_API_KEY}"
        if [ -n "$BESTBLOGS_API_KEY" ]; then
          echo "API Key prefix: ${BESTBLOGS_API_KEY:0:10}..."
        fi
        echo "========================="
        pnpm install
        if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
          pnpm run backfill
        else
          pnpm run once
        fi

    - name: Check for changes
      id: git-check
      run: |
        git add .
        # 1. 检查抓取产生的数据变动
        DATA_CHANGED=$(git status --porcelain)
        
        # 2. 安全检查代码变动：判断是否存在父提交
        if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
          CODE_CHANGED=$(git diff --name-only HEAD^ HEAD | grep -E "^site/|^server/|^vercel\.json|^package\.json" || true)
        else
          # 如果是首次提交，强行标记为已变动
          CODE_CHANGED="initial-setup"
        fi
        
        if [ -n "$DATA_CHANGED" ] || [ -n "$CODE_CHANGED" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Frontend
      if: steps.git-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
      working-directory: ./read-rss
      run: |
        npm install
        npm run build

    - name: Prepare Deployment Folder
      run: |
        mkdir -p deploy

        # Angular 构建产物
        if [ -d "read-rss/dist" ]; then
          cp -r read-rss/dist/* deploy/
        fi

        # 拷贝后端 Serverless API
        cp -r api deploy/

        # 拷贝数据文件
        cp -r data deploy/ || true
        cp -r details deploy/ || true
        cp README.md deploy/ || true
        cp TAGS.md deploy/ || true

    - name: Deploy to Data Branch
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: deploy
        branch: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
        commit_message: "arch: initial data branch setup"
        single-commit: false
