
name: RSS Crawler

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: 
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Run Crawler
        run: node scripts/fetch-feeds.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update rss feeds [skip ci]"
          file_pattern: "src/assets/feeds.json"
